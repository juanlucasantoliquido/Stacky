# V1.4b (plan 22) — CI mínima que protege el arnés.
#
# Dos jobs sin servicios externos (sqlite + filesystem alcanzan):
#   1. harness-tests: corre el runner curado por-archivo (esquiva la polución).
#   2. evals: corre las evals golden del backend.
#
# El runner (scripts/run_harness_tests.sh) es un ratchet: la lista solo crece.
name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: "Stacky Agents/backend"

jobs:
  harness-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run curated harness tests (file-by-file)
        env:
          DATABASE_URL: "sqlite:///:memory:"
          LLM_BACKEND: "mock"
        run: bash scripts/run_harness_tests.sh

  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run golden evals
        env:
          DATABASE_URL: "sqlite:///:memory:"
          LLM_BACKEND: "mock"
        run: python -m evals run all
