<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- analyst-2: Senior Technical Analyst -->
  <rect x="24" y="8" width="16" height="16" fill="#c68642"/>
  <!-- hair short grey -->
  <rect x="22" y="5" width="20" height="7" fill="#6b7280"/>
  <rect x="20" y="8" width="4" height="8" fill="#6b7280"/>
  <rect x="40" y="8" width="4" height="8" fill="#6b7280"/>
  <!-- glasses round -->
  <rect x="24" y="13" width="8" height="6" fill="none" stroke="#f1c40f" stroke-width="1"/>
  <rect x="32" y="13" width="8" height="6" fill="none" stroke="#f1c40f" stroke-width="1"/>
  <rect x="32" y="16" width="0" height="0"/>
  <!-- eyes -->
  <rect x="27" y="15" width="2" height="2" fill="#1a1a2e"/>
  <rect x="35" y="15" width="2" height="2" fill="#1a1a2e"/>
  <!-- beard gray -->
  <rect x="26" y="20" width="12" height="4" fill="#6b7280"/>
  <!-- shirt blue -->
  <rect x="18" y="24" width="28" height="20" fill="#1d4ed8"/>
  <rect x="10" y="24" width="10" height="16" fill="#1d4ed8"/>
  <rect x="44" y="24" width="10" height="16" fill="#1d4ed8"/>
  <!-- vest grey over shirt -->
  <rect x="20" y="24" width="24" height="18" fill="#374151"/>
  <!-- collar -->
  <rect x="28" y="24" width="8" height="6" fill="#1d4ed8"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#c68642"/>
  <rect x="46" y="40" width="8" height="6" fill="#c68642"/>
  <!-- pants dark -->
  <rect x="20" y="44" width="10" height="14" fill="#1f2937"/>
  <rect x="34" y="44" width="10" height="14" fill="#1f2937"/>
  <!-- shoes -->
  <rect x="18" y="56" width="14" height="6" fill="#111"/>
  <rect x="32" y="56" width="14" height="6" fill="#111"/>
</svg>
