<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- architect-1: Software Architect with blueprints -->
  <rect x="24" y="8" width="16" height="16" fill="#f5c5a3"/>
  <!-- grey hair with glasses -->
  <rect x="22" y="4" width="20" height="8" fill="#8b949e"/>
  <rect x="20" y="8" width="4" height="8" fill="#8b949e"/>
  <rect x="40" y="8" width="4" height="8" fill="#8b949e"/>
  <!-- glasses -->
  <rect x="25" y="14" width="6" height="4" fill="none" stroke="#58a6ff" stroke-width="1"/>
  <rect x="33" y="14" width="6" height="4" fill="none" stroke="#58a6ff" stroke-width="1"/>
  <rect x="31" y="16" width="2" height="1" fill="#58a6ff"/>
  <!-- eyes -->
  <rect x="27" y="15" width="2" height="2" fill="#1a1a2e"/>
  <rect x="35" y="15" width="2" height="2" fill="#1a1a2e"/>
  <!-- mustache grey -->
  <rect x="27" y="20" width="10" height="2" fill="#8b949e"/>
  <!-- shirt blue button-down -->
  <rect x="18" y="24" width="28" height="20" fill="#1c4a8a"/>
  <rect x="10" y="24" width="10" height="16" fill="#1c4a8a"/>
  <rect x="44" y="24" width="10" height="16" fill="#1c4a8a"/>
  <!-- collar -->
  <rect x="26" y="24" width="12" height="6" fill="#f0f0f0"/>
  <rect x="28" y="24" width="8" height="20" fill="#f0f0f0"/>
  <!-- buttons -->
  <rect x="31" y="26" width="2" height="2" fill="#1c4a8a"/>
  <rect x="31" y="30" width="2" height="2" fill="#1c4a8a"/>
  <rect x="31" y="34" width="2" height="2" fill="#1c4a8a"/>
  <!-- blueprint roll -->
  <rect x="44" y="26" width="14" height="10" fill="#388bfd"/>
  <rect x="45" y="27" width="12" height="8" fill="#1c4a8a"/>
  <rect x="46" y="29" width="2" height="1" fill="#58a6ff"/>
  <rect x="50" y="29" width="6" height="1" fill="#58a6ff"/>
  <rect x="46" y="31" width="8" height="1" fill="#58a6ff"/>
  <rect x="46" y="33" width="4" height="1" fill="#58a6ff"/>
  <rect x="44" y="24" width="2" height="12" fill="#f0e0a0"/>
  <rect x="56" y="24" width="2" height="12" fill="#f0e0a0"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#f5c5a3"/>
  <rect x="46" y="40" width="8" height="6" fill="#f5c5a3"/>
  <!-- pants grey -->
  <rect x="20" y="44" width="10" height="14" fill="#4a5568"/>
  <rect x="34" y="44" width="10" height="14" fill="#4a5568"/>
  <!-- shoes -->
  <rect x="18" y="56" width="14" height="6" fill="#2c3e50"/>
  <rect x="32" y="56" width="14" height="6" fill="#2c3e50"/>
</svg>
