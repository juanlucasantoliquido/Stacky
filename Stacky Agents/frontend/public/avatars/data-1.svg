<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- data-1: Data Engineer with goggles and terminal -->
  <rect x="24" y="8" width="16" height="16" fill="#daa06c"/>
  <!-- hair black afro -->
  <rect x="18" y="4" width="28" height="14" fill="#1a0a00"/>
  <rect x="16" y="8" width="4" height="10" fill="#1a0a00"/>
  <rect x="44" y="8" width="4" height="10" fill="#1a0a00"/>
  <!-- goggles orange -->
  <rect x="23" y="12" width="8" height="6" fill="#e67e22"/>
  <rect x="33" y="12" width="8" height="6" fill="#e67e22"/>
  <rect x="31" y="14" width="2" height="2" fill="#e67e22"/>
  <!-- goggle lenses -->
  <rect x="24" y="13" width="6" height="4" fill="#f39c12" opacity="0.5"/>
  <rect x="34" y="13" width="6" height="4" fill="#f39c12" opacity="0.5"/>
  <!-- mouth -->
  <rect x="29" y="21" width="6" height="2" fill="#8d5524"/>
  <!-- lab coat white -->
  <rect x="18" y="24" width="28" height="20" fill="#f8f8f8"/>
  <rect x="10" y="24" width="10" height="16" fill="#f8f8f8"/>
  <rect x="44" y="24" width="10" height="16" fill="#f8f8f8"/>
  <!-- terminal shirt underneath -->
  <rect x="28" y="24" width="8" height="20" fill="#0d1117"/>
  <!-- code text green on terminal -->
  <rect x="29" y="27" width="6" height="1" fill="#3fb950"/>
  <rect x="29" y="29" width="4" height="1" fill="#3fb950"/>
  <rect x="29" y="31" width="5" height="1" fill="#3fb950"/>
  <rect x="29" y="33" width="3" height="1" fill="#3fb950"/>
  <!-- pockets on coat -->
  <rect x="20" y="34" width="8" height="8" fill="#e0e0e0"/>
  <rect x="36" y="34" width="8" height="8" fill="#e0e0e0"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#daa06c"/>
  <rect x="46" y="40" width="8" height="6" fill="#daa06c"/>
  <!-- pants -->
  <rect x="20" y="44" width="10" height="14" fill="#2c3e50"/>
  <rect x="34" y="44" width="10" height="14" fill="#2c3e50"/>
  <!-- shoes -->
  <rect x="18" y="56" width="14" height="6" fill="#111"/>
  <rect x="32" y="56" width="14" height="6" fill="#111"/>
</svg>
