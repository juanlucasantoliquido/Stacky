  <rect x="20" y="8" width="4" height="8" fill="#2d1b00"/>
  <rect x="40" y="8" width="4" height="8" fill="#2d1b00"/>
  <!-- eyes -->
  <rect x="27" y="15" width="4" height="3" fill="#1a1a2e"/>
  <rect x="33" y="15" width="4" height="3" fill="#1a1a2e"/>
