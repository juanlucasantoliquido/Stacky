<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- dev-2: Developer with glasses and dark skin -->
  <rect x="24" y="8" width="16" height="16" fill="#8d5524"/>
  <rect x="22" y="6" width="20" height="4" fill="#1a0a00"/>
  <rect x="20" y="8" width="4" height="8" fill="#1a0a00"/>
  <rect x="40" y="8" width="4" height="8" fill="#1a0a00"/>
  <!-- glasses -->
  <rect x="24" y="13" width="7" height="5" fill="none" stroke="#c0c0c0" stroke-width="1"/>
  <rect x="33" y="13" width="7" height="5" fill="none" stroke="#c0c0c0" stroke-width="1"/>
  <rect x="31" y="15" width="2" height="2" fill="#c0c0c0"/>
  <!-- eyes behind glasses -->
  <rect x="26" y="14" width="3" height="3" fill="#1a1a2e"/>
  <rect x="35" y="14" width="3" height="3" fill="#1a1a2e"/>
  <!-- mouth -->
  <rect x="29" y="20" width="6" height="2" fill="#6b3a2a"/>
  <!-- t-shirt green -->
  <rect x="18" y="24" width="28" height="20" fill="#3fb950"/>
  <rect x="10" y="24" width="10" height="16" fill="#3fb950"/>
  <rect x="44" y="24" width="10" height="16" fill="#3fb950"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#8d5524"/>
  <rect x="46" y="40" width="8" height="6" fill="#8d5524"/>
  <!-- jeans -->
  <rect x="20" y="44" width="10" height="14" fill="#1c4a8a"/>
  <rect x="34" y="44" width="10" height="14" fill="#1c4a8a"/>
  <!-- shoes -->
  <rect x="18" y="56" width="14" height="6" fill="#8b4513"/>
  <rect x="32" y="56" width="14" height="6" fill="#8b4513"/>
</svg>
