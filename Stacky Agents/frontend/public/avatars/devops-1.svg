  <!-- hard hat yellow -->
  <rect x="18" y="4" width="28" height="6" fill="#f1c40f"/>
  <rect x="20" y="6" width="24" height="8" fill="#f1c40f"/>
  <rect x="16" y="10" width="32" height="4" fill="#d4ac0d"/>
