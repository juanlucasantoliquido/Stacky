  <rect x="9" y="38" width="3" height="3" fill="#8b949e"/>
  <!-- pants work green -->
  <rect x="20" y="46" width="10" height="14" fill="#2ecc71"/>
  <rect x="34" y="46" width="10" height="14" fill="#2ecc71"/>
  <!-- boots brown -->
  <rect x="18" y="56" width="14" height="8" fill="#8b4513"/>
  <rect x="32" y="56" width="14" height="8" fill="#8b4513"/>
  <rect x="18" y="58" width="14" height="2" fill="#5d2e0c"/>
  <rect x="32" y="58" width="14" height="2" fill="#5d2e0c"/>
