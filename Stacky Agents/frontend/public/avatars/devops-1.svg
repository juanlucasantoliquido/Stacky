  <rect x="27" y="18" width="4" height="3" fill="#1a1a2e"/>
  <rect x="33" y="18" width="4" height="3" fill="#1a1a2e"/>
  <!-- mouth -->
  <rect x="29" y="24" width="6" height="2" fill="#c4724a"/>
