<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- mobile-1: Mobile Developer with phone -->
  <rect x="24" y="8" width="16" height="16" fill="#f5c5a3"/>
  <!-- spiky hair blue -->
  <rect x="22" y="2" width="20" height="8" fill="#388bfd"/>
  <rect x="20" y="4" width="4" height="8" fill="#388bfd"/>
  <rect x="24" y="0" width="4" height="6" fill="#388bfd"/>
  <rect x="30" y="0" width="4" height="4" fill="#388bfd"/>
  <rect x="36" y="2" width="4" height="6" fill="#388bfd"/>
  <rect x="40" y="4" width="4" height="8" fill="#388bfd"/>
  <!-- eyes -->
  <rect x="27" y="14" width="4" height="3" fill="#1a1a2e"/>
  <rect x="33" y="14" width="4" height="3" fill="#1a1a2e"/>
  <!-- mouth -->
  <rect x="28" y="20" width="8" height="2" fill="#c4724a"/>
  <!-- shirt white with app icons -->
  <rect x="18" y="24" width="28" height="20" fill="#f0f0f0"/>
  <rect x="10" y="24" width="10" height="16" fill="#f0f0f0"/>
  <rect x="44" y="24" width="10" height="16" fill="#f0f0f0"/>
  <!-- app icon grid -->
  <rect x="22" y="28" width="6" height="6" fill="#e74c3c" rx="1"/>
  <rect x="30" y="28" width="6" height="6" fill="#3fb950" rx="1"/>
  <rect x="38" y="28" width="6" height="6" fill="#388bfd" rx="1"/>
  <rect x="22" y="36" width="6" height="6" fill="#f39c12" rx="1"/>
  <rect x="30" y="36" width="6" height="6" fill="#a371f7" rx="1"/>
  <rect x="38" y="36" width="6" height="6" fill="#16a085" rx="1"/>
  <!-- phone in hand -->
  <rect x="4" y="30" width="8" height="14" fill="#21262d"/>
  <rect x="5" y="31" width="6" height="12" fill="#0d1117"/>
  <rect x="5" y="32" width="6" height="9" fill="#388bfd" opacity="0.6"/>
  <rect x="7" y="42" width="2" height="1" fill="#8b949e"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#f5c5a3"/>
  <rect x="46" y="40" width="8" height="6" fill="#f5c5a3"/>
  <!-- jeans -->
  <rect x="20" y="44" width="10" height="14" fill="#1c4a8a"/>
  <rect x="34" y="44" width="10" height="14" fill="#1c4a8a"/>
  <!-- sneakers -->
  <rect x="18" y="56" width="14" height="6" fill="#388bfd"/>
  <rect x="32" y="56" width="14" height="6" fill="#388bfd"/>
  <rect x="18" y="58" width="14" height="2" fill="#f0f0f0"/>
  <rect x="32" y="58" width="14" height="2" fill="#f0f0f0"/>
</svg>
