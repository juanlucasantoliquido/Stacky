<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- ninja-1: Ninja Developer (mystery agent) -->
  <!-- all black outfit -->
  <rect x="18" y="6" width="28" height="18" fill="#0d1117"/>
  <!-- mask -->
  <rect x="22" y="10" width="20" height="10" fill="#1c2a3a"/>
  <!-- eyes only visible - red glow -->
  <rect x="26" y="12" width="5" height="4" fill="#e74c3c"/>
  <rect x="33" y="12" width="5" height="4" fill="#e74c3c"/>
  <!-- eye glow effect -->
  <rect x="26" y="12" width="5" height="4" fill="#ff6b6b" opacity="0.5"/>
  <rect x="33" y="12" width="5" height="4" fill="#ff6b6b" opacity="0.5"/>
  <!-- headband red -->
  <rect x="18" y="8" width="28" height="4" fill="#e74c3c"/>
  <!-- body black -->
  <rect x="18" y="24" width="28" height="20" fill="#0d1117"/>
  <rect x="10" y="24" width="10" height="16" fill="#0d1117"/>
  <rect x="44" y="24" width="10" height="16" fill="#0d1117"/>
  <!-- belt red -->
  <rect x="18" y="38" width="28" height="4" fill="#e74c3c"/>
  <!-- hands black -->
  <rect x="10" y="40" width="8" height="6" fill="#1c2a3a"/>
  <rect x="46" y="40" width="8" height="6" fill="#1c2a3a"/>
  <!-- shuriken -->
  <rect x="48" y="26" width="8" height="8" fill="#8b949e" opacity="0.8"/>
  <rect x="50" y="24" width="4" height="12" fill="#8b949e" opacity="0.8"/>
  <rect x="46" y="28" width="12" height="4" fill="#8b949e" opacity="0.8"/>
  <!-- pants black -->
  <rect x="20" y="44" width="10" height="14" fill="#0d1117"/>
  <rect x="34" y="44" width="10" height="14" fill="#0d1117"/>
  <!-- boots black -->
  <rect x="18" y="56" width="14" height="6" fill="#1c2a3a"/>
  <rect x="32" y="56" width="14" height="6" fill="#1c2a3a"/>
</svg>
