<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- pm-1: Project Manager with suit and tie -->
  <rect x="24" y="8" width="16" height="16" fill="#f5c5a3"/>
  <!-- hair black short -->
  <rect x="22" y="4" width="20" height="8" fill="#1a1a2e"/>
  <rect x="20" y="8" width="4" height="6" fill="#1a1a2e"/>
  <rect x="40" y="8" width="4" height="6" fill="#1a1a2e"/>
  <!-- eyes -->
  <rect x="27" y="14" width="4" height="3" fill="#1a1a2e"/>
  <rect x="33" y="14" width="4" height="3" fill="#1a1a2e"/>
  <!-- mouth -->
  <rect x="29" y="20" width="6" height="2" fill="#c4724a"/>
  <!-- suit jacket dark -->
  <rect x="18" y="24" width="28" height="20" fill="#1c2a3a"/>
  <rect x="10" y="24" width="10" height="16" fill="#1c2a3a"/>
  <rect x="44" y="24" width="10" height="16" fill="#1c2a3a"/>
  <!-- shirt white -->
  <rect x="28" y="24" width="8" height="20" fill="#f0f0f0"/>
  <!-- tie red -->
  <rect x="30" y="24" width="4" height="16" fill="#e74c3c"/>
  <rect x="29" y="36" width="6" height="6" fill="#e74c3c"/>
  <!-- lapels -->
  <rect x="18" y="24" width="10" height="12" fill="#243447"/>
  <rect x="36" y="24" width="10" height="12" fill="#243447"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#f5c5a3"/>
  <rect x="46" y="40" width="8" height="6" fill="#f5c5a3"/>
  <!-- pants dark -->
  <rect x="20" y="44" width="10" height="14" fill="#1c2a3a"/>
  <rect x="34" y="44" width="10" height="14" fill="#1c2a3a"/>
  <!-- shoes black shiny -->
  <rect x="18" y="56" width="14" height="6" fill="#0d1117"/>
  <rect x="32" y="56" width="14" height="6" fill="#0d1117"/>
  <rect x="20" y="57" width="4" height="2" fill="#388bfd" opacity="0.4"/>
  <rect x="34" y="57" width="4" height="2" fill="#388bfd" opacity="0.4"/>
</svg>
