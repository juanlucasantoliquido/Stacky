<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- qa-1: QA Engineer with headset -->
  <rect x="24" y="8" width="16" height="16" fill="#f5c5a3"/>
  <!-- hair blond -->
  <rect x="22" y="6" width="20" height="6" fill="#f1c40f"/>
  <rect x="20" y="8" width="4" height="8" fill="#f1c40f"/>
  <rect x="40" y="8" width="4" height="8" fill="#f1c40f"/>
  <!-- headset band -->
  <rect x="20" y="4" width="24" height="4" fill="#2c3e50"/>
  <rect x="18" y="8" width="4" height="8" fill="#2c3e50"/>
  <rect x="42" y="8" width="4" height="8" fill="#2c3e50"/>
  <!-- headset mic -->
  <rect x="16" y="14" width="4" height="2" fill="#e74c3c"/>
  <rect x="12" y="16" width="4" height="2" fill="#e74c3c"/>
  <!-- eyes -->
  <rect x="27" y="14" width="4" height="4" fill="#2c3e50"/>
  <rect x="33" y="14" width="4" height="4" fill="#2c3e50"/>
  <!-- mouth smile -->
  <rect x="27" y="21" width="10" height="2" fill="#c0392b"/>
  <rect x="26" y="20" width="2" height="2" fill="#c0392b"/>
  <rect x="36" y="20" width="2" height="2" fill="#c0392b"/>
  <!-- shirt orange -->
  <rect x="18" y="24" width="28" height="20" fill="#d29922"/>
  <rect x="10" y="24" width="10" height="16" fill="#d29922"/>
  <rect x="44" y="24" width="10" height="16" fill="#d29922"/>
  <!-- BUG badge -->
  <rect x="22" y="28" width="20" height="10" fill="#e74c3c" rx="2"/>
  <rect x="24" y="30" width="16" height="6" fill="#c0392b"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#f5c5a3"/>
  <rect x="46" y="40" width="8" height="6" fill="#f5c5a3"/>
  <!-- pants dark -->
  <rect x="20" y="44" width="10" height="14" fill="#1c2a3a"/>
  <rect x="34" y="44" width="10" height="14" fill="#1c2a3a"/>
  <!-- shoes -->
  <rect x="18" y="56" width="14" height="6" fill="#2c3e50"/>
  <rect x="32" y="56" width="14" height="6" fill="#2c3e50"/>
</svg>
