<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- robot-1: Robot / AI Agent avatar -->
  <!-- body metallic -->
  <rect x="16" y="24" width="32" height="24" fill="#30363d"/>
  <rect x="18" y="26" width="28" height="20" fill="#21262d"/>
  <!-- head square -->
  <rect x="18" y="6" width="28" height="22" fill="#30363d"/>
  <rect x="20" y="8" width="24" height="18" fill="#21262d"/>
  <!-- antenna -->
  <rect x="30" y="2" width="4" height="6" fill="#8b949e"/>
  <rect x="28" y="0" width="8" height="4" fill="#f1c40f"/>
  <!-- eye screens blue -->
  <rect x="22" y="12" width="8" height="8" fill="#0d1117"/>
  <rect x="34" y="12" width="8" height="8" fill="#0d1117"/>
  <rect x="23" y="13" width="6" height="6" fill="#388bfd" opacity="0.8"/>
  <rect x="35" y="13" width="6" height="6" fill="#388bfd" opacity="0.8"/>
  <!-- scan line on eyes -->
  <rect x="23" y="16" width="6" height="1" fill="#58a6ff"/>
  <rect x="35" y="16" width="6" height="1" fill="#58a6ff"/>
  <!-- mouth LED bar -->
  <rect x="22" y="22" width="20" height="4" fill="#0d1117"/>
  <rect x="23" y="23" width="3" height="2" fill="#3fb950"/>
  <rect x="27" y="23" width="3" height="2" fill="#3fb950"/>
  <rect x="31" y="23" width="3" height="2" fill="#f1c40f"/>
  <rect x="35" y="23" width="3" height="2" fill="#3fb950"/>
  <rect x="39" y="23" width="2" height="2" fill="#3fb950"/>
  <!-- chest panel -->
  <rect x="22" y="30" width="20" height="12" fill="#0d1117"/>
  <rect x="24" y="32" width="4" height="4" fill="#388bfd" opacity="0.7"/>
  <rect x="30" y="32" width="4" height="4" fill="#3fb950" opacity="0.7"/>
  <rect x="36" y="32" width="4" height="4" fill="#e74c3c" opacity="0.7"/>
  <rect x="24" y="37" width="16" height="2" fill="#f1c40f" opacity="0.6"/>
  <!-- arms -->
  <rect x="4" y="24" width="14" height="10" fill="#30363d"/>
  <rect x="46" y="24" width="14" height="10" fill="#30363d"/>
  <!-- claws/hands -->
  <rect x="4" y="34" width="6" height="6" fill="#8b949e"/>
  <rect x="10" y="36" width="4" height="4" fill="#8b949e"/>
  <rect x="50" y="34" width="6" height="6" fill="#8b949e"/>
  <rect x="50" y="36" width="4" height="4" fill="#8b949e"/>
  <!-- legs -->
  <rect x="20" y="48" width="10" height="14" fill="#30363d"/>
  <rect x="34" y="48" width="10" height="14" fill="#30363d"/>
  <!-- feet -->
  <rect x="18" y="58" width="14" height="6" fill="#21262d"/>
  <rect x="32" y="58" width="14" height="6" fill="#21262d"/>
</svg>
