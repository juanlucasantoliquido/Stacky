<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- scrum-1: Scrum Master with post-it notes -->
  <rect x="24" y="8" width="16" height="16" fill="#f5c5a3"/>
  <!-- curly hair orange -->
  <rect x="20" y="4" width="24" height="12" fill="#e67e22"/>
  <rect x="18" y="8" width="4" height="12" fill="#e67e22"/>
  <rect x="42" y="8" width="4" height="12" fill="#e67e22"/>
  <rect x="20" y="14" width="4" height="4" fill="#d35400"/>
  <rect x="26" y="4" width="4" height="4" fill="#d35400"/>
  <rect x="34" y="4" width="4" height="4" fill="#d35400"/>
  <rect x="40" y="14" width="4" height="4" fill="#d35400"/>
  <!-- eyes -->
  <rect x="27" y="13" width="4" height="4" fill="#2c3e50"/>
  <rect x="33" y="13" width="4" height="4" fill="#2c3e50"/>
  <!-- big smile -->
  <rect x="26" y="20" width="12" height="2" fill="#c0392b"/>
  <rect x="25" y="19" width="2" height="2" fill="#c0392b"/>
  <rect x="37" y="19" width="2" height="2" fill="#c0392b"/>
  <!-- vest yellow over white shirt -->
  <rect x="18" y="24" width="28" height="20" fill="#f0f0f0"/>
  <rect x="10" y="24" width="10" height="16" fill="#f0f0f0"/>
  <rect x="44" y="24" width="10" height="16" fill="#f0f0f0"/>
  <rect x="18" y="24" width="10" height="20" fill="#f39c12"/>
  <rect x="36" y="24" width="10" height="20" fill="#f39c12"/>
  <!-- post-it notes on wall behind -->
  <rect x="4" y="4" width="10" height="10" fill="#f1c40f"/>
  <rect x="5" y="5" width="8" height="8" fill="#f39c12" opacity="0.7"/>
  <rect x="4" y="16" width="10" height="10" fill="#e74c3c"/>
  <rect x="4" y="28" width="10" height="10" fill="#3fb950"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#f5c5a3"/>
  <rect x="46" y="40" width="8" height="6" fill="#f5c5a3"/>
  <!-- pants -->
  <rect x="20" y="44" width="10" height="14" fill="#2c3e50"/>
  <rect x="34" y="44" width="10" height="14" fill="#2c3e50"/>
  <!-- shoes -->
  <rect x="18" y="56" width="14" height="6" fill="#111"/>
  <rect x="32" y="56" width="14" height="6" fill="#111"/>
</svg>
