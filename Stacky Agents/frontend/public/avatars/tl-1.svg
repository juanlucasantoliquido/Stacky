  <rect x="10" y="40" width="8" height="6" fill="#f5c5a3"/>
  <rect x="46" y="40" width="8" height="6" fill="#f5c5a3"/>
  <!-- pants -->
  <rect x="20" y="44" width="10" height="14" fill="#21262d"/>
  <rect x="34" y="44" width="10" height="14" fill="#21262d"/>
