<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- ux-1: UX Designer with beret and palette -->
  <rect x="24" y="10" width="16" height="16" fill="#f5c5a3"/>
  <!-- beret pink -->
  <rect x="18" y="4" width="28" height="10" fill="#e91e8c"/>
  <rect x="14" y="8" width="36" height="4" fill="#c71585"/>
  <rect x="36" y="2" width="4" height="4" fill="#e91e8c"/>
  <!-- hair wavy light brown -->
  <rect x="20" y="10" width="4" height="10" fill="#c19a6b"/>
  <rect x="40" y="10" width="4" height="10" fill="#c19a6b"/>
  <rect x="20" y="24" width="4" height="8" fill="#c19a6b"/>
  <rect x="40" y="24" width="4" height="8" fill="#c19a6b"/>
  <!-- eyes with lashes -->
  <rect x="27" y="16" width="4" height="3" fill="#2c3e50"/>
  <rect x="33" y="16" width="4" height="3" fill="#2c3e50"/>
  <rect x="27" y="15" width="4" height="1" fill="#1a1a2e"/>
  <rect x="33" y="15" width="4" height="1" fill="#1a1a2e"/>
  <!-- mouth red lipstick -->
  <rect x="28" y="22" width="8" height="2" fill="#e91e8c"/>
  <!-- creative top colorful -->
  <rect x="18" y="26" width="28" height="18" fill="#ff6b9d"/>
  <rect x="10" y="26" width="10" height="14" fill="#ff6b9d"/>
  <rect x="44" y="26" width="10" height="14" fill="#ff6b9d"/>
  <!-- color swatches on shirt -->
  <rect x="24" y="30" width="4" height="4" fill="#f39c12"/>
  <rect x="30" y="30" width="4" height="4" fill="#3fb950"/>
  <rect x="36" y="30" width="4" height="4" fill="#388bfd"/>
  <!-- palette in hand -->
  <rect x="44" y="32" width="14" height="12" fill="#f0e0c0"/>
  <rect x="46" y="33" width="3" height="3" fill="#e74c3c"/>
  <rect x="50" y="33" width="3" height="3" fill="#3498db"/>
  <rect x="54" y="33" width="3" height="3" fill="#2ecc71"/>
  <rect x="46" y="37" width="3" height="3" fill="#f39c12"/>
  <rect x="50" y="37" width="3" height="3" fill="#9b59b6"/>
  <!-- brush -->
  <rect x="10" y="30" width="2" height="14" fill="#8b4513"/>
  <rect x="9" y="42" width="4" height="3" fill="#f1c40f"/>
  <!-- hands -->
  <rect x="10" y="40" width="8" height="6" fill="#f5c5a3"/>
  <rect x="46" y="40" width="8" height="6" fill="#f5c5a3"/>
  <!-- pants white -->
  <rect x="20" y="44" width="10" height="14" fill="#f0f0f0"/>
  <rect x="34" y="44" width="10" height="14" fill="#f0f0f0"/>
  <!-- shoes pink -->
  <rect x="18" y="56" width="14" height="6" fill="#e91e8c"/>
  <rect x="32" y="56" width="14" height="6" fill="#e91e8c"/>
