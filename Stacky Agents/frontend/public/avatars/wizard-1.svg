<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- wizard-1: AI/ML Wizard with magic hat -->
  <!-- wizard hat -->
  <rect x="28" y="0" width="8" height="14" fill="#6b21a8"/>
  <rect x="26" y="6" width="12" height="8" fill="#7c3aed"/>
  <rect x="20" y="12" width="24" height="6" fill="#8b5cf6"/>
  <!-- stars on hat -->
  <rect x="30" y="2" width="2" height="2" fill="#f1c40f"/>
  <rect x="34" y="5" width="2" height="2" fill="#f1c40f"/>
  <rect x="27" y="7" width="2" height="2" fill="#f1c40f"/>
  <!-- face -->
  <rect x="24" y="16" width="16" height="14" fill="#f5c5a3"/>
  <!-- long white beard -->
  <rect x="24" y="26" width="16" height="12" fill="#e2e8f0"/>
  <rect x="26" y="38" width="12" height="8" fill="#e2e8f0"/>
  <rect x="28" y="46" width="8" height="6" fill="#e2e8f0"/>
  <!-- eyes wise old -->
  <rect x="27" y="20" width="4" height="3" fill="#7c3aed"/>
  <rect x="33" y="20" width="4" height="3" fill="#7c3aed"/>
  <!-- wrinkles -->
  <rect x="24" y="19" width="3" height="1" fill="#d4a082" opacity="0.6"/>
  <rect x="37" y="19" width="3" height="1" fill="#d4a082" opacity="0.6"/>
  <!-- robe purple -->
  <rect x="14" y="26" width="36" height="22" fill="#581c87"/>
  <rect x="8" y="28" width="12" height="18" fill="#581c87"/>
  <rect x="44" y="28" width="12" height="18" fill="#581c87"/>
  <!-- robe stars -->
  <rect x="18" y="32" width="2" height="2" fill="#f1c40f"/>
  <rect x="26" y="36" width="2" height="2" fill="#f1c40f"/>
  <rect x="40" y="30" width="2" height="2" fill="#f1c40f"/>
  <rect x="34" y="40" width="2" height="2" fill="#f1c40f"/>
  <!-- magic staff -->
  <rect x="54" y="10" width="4" height="36" fill="#92400e"/>
  <rect x="52" y="8" width="8" height="8" fill="#f1c40f"/>
  <rect x="50" y="6" width="12" height="4" fill="#a371f7"/>
  <!-- glowing orb on staff -->
  <rect x="53" y="7" width="6" height="6" fill="#c084fc" opacity="0.8"/>
  <!-- hands -->
  <rect x="8" y="46" width="8" height="6" fill="#f5c5a3"/>
  <rect x="48" y="34" width="8" height="6" fill="#f5c5a3"/>
  <!-- robe bottom -->
  <rect x="14" y="48" width="36" height="14" fill="#6d28d9"/>
  <!-- boots dark purple -->
  <rect x="16" y="58" width="14" height="6" fill="#3b0764"/>
  <rect x="34" y="58" width="14" height="6" fill="#3b0764"/>
</svg>
