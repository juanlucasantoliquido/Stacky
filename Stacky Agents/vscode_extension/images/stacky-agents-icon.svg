<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="hex-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#1158d1"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="128" height="128" rx="22" fill="#0d1117"/>

  <!-- Hex drop shadow -->
  <polygon
    points="114,57 90,93 38,93 14,57 38,21 90,21"
    fill="#1f6feb"
    opacity="0.18"
    transform="translate(0,4)"
  />

  <!-- Filled hexagon -->
  <polygon
    points="114,57 90,93 38,93 14,57 38,21 90,21"
    fill="url(#hex-g)"
  />

  <!-- Top-half sheen for depth -->
  <polygon
    points="38,21 90,21 114,57 14,57"
    fill="white"
    opacity="0.08"
  />

  <!-- S monogram -->
  <text
    x="64" y="61"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
  >S</text>

  <!-- AGENTS wordmark -->
  <text
    x="64" y="114"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9"
    font-weight="700"
    fill="#58a6ff"
    text-anchor="middle"
    letter-spacing="4.5"
  >AGENTS</text>
</svg>

  <defs>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#388bfd" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#388bfd" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="128" height="128" rx="20" fill="#0d1117"/>

  <!-- Outer hex glow (slightly larger, blurred) -->
  <polygon
    points="118,56 98,92 30,92 10,56 30,20 98,20"
    fill="none"
    stroke="#388bfd"
    stroke-width="1"
    stroke-opacity="0.25"
    filter="url(#drop-shadow)"
  />

  <!-- Main hexagon fill -->
  <polygon
    points="115,56 95,90 33,90 13,56 33,22 95,22"
    fill="url(#glow-grad)"
  />

  <!-- Main hexagon stroke -->
  <polygon
    points="115,56 95,90 33,90 13,56 33,22 95,22"
    fill="none"
    stroke="url(#hex-grad)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- Subtle inner hex line for depth -->
  <polygon
    points="107,56 89,84 39,84 21,56 39,28 89,28"
    fill="none"
    stroke="#388bfd"
    stroke-width="0.75"
    stroke-opacity="0.2"
  />

  <!-- "Stacky" text centered in hex -->
  <text
    x="64"
    y="60"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="800"
    fill="#58a6ff"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5"
  >Stacky</text>

  <!-- "AGENTS" label below the hex -->
  <text
    x="64"
    y="112"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="10"
    font-weight="600"
    fill="#388bfd"
    text-anchor="middle"
    letter-spacing="3.5"
  >AGENTS</text>
</svg>
