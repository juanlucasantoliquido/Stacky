# ─────────────────────────────────────────────────────────────────────────────
FrmGestionFlujos.aspx:
  screen_type: list
  direct_entry_allowed: true
  deeplink_allowed: false
  human_path_required_for_uat: false
  notes: "Hub del editor de Workflow judicial. Page_Load puebla el árbol treeviewWF (GetFlujoList) y auto-selecciona el primer nodo. No depende de Session para entrar. btnEditor navega a FrmEditorWorkflow.aspx (Session IdModelo/IdVersion/AccessMode). Acciones que mutan: btnGuardar/btnNewVersion/btnCopiarVesion/btnGuardarVersion/btnProduccion/btnEliminar — sólo en UAT con flujos de prueba."

  human_paths:
    open_direct:
      entrypoint: FrmGestionFlujos.aspx
      steps:
        - "Navigate directly to FrmGestionFlujos.aspx"
      required_data: []
      emits_context:
        - flujos_tree_visible
      required_assertions:
        - flujos_tree_visible

  assertions:
    flujos_tree_visible: "Árbol de procedimientos (AISTreeView treeviewWF) renderizado"

  related_playbooks:
    smoke:
      - open_gestion_flujos                     # goto_direct → árbol auto-poblado + primer nodo seleccionado en Page_Load
    by_filter:
      - open_gestion_flujos                     # checkHistoricos/checkObsoletos (AutoPostBack) reincorporan flujos estado 4/5
    chained:
      - open_gestion_flujos                     # btnEditor → FrmEditorWorkflow.aspx (Session IdModelo/IdVersion/AccessMode)

