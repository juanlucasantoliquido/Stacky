# navigation_contracts.yml — Navigation contracts for Stacky QA UAT Agent
#
# DESCRIPTION
# -----------
# Declares, per screen, whether direct entry is allowed, whether deeplink is
# supported, what human navigation paths are approved, and what lanes may use
# each strategy.
#
# SCHEMA (per screen)
# -------------------
# screen_type:
#   entrypoint   — can be reached directly without context (login page, search page)
#   detail       — requires context from a prior navigation (entity selected)
#   list         — list/search screen (may or may not require prior context)
#   form         — data entry / edit form
#   popup        — modal / popup dialog
#   report       — report viewer
#
# direct_entry_allowed: bool  — plain goto(url) without params is safe
# deeplink_allowed: bool      — deeplink with params reconstructs context
# human_path_required_for_uat: bool — uat_human lane MUST use human nav
#
# deeplink:
#   pattern: url pattern with {PARAM} placeholders
#   required_params: list of param names
#   reconstructs_context: list of context items the deeplink sets up
#   required_assertions: list of assertion keys that MUST pass after deeplink
#   allowed_lanes: lanes that MAY use deeplink
#   forbidden_lanes: lanes that MUST NOT use deeplink
#
# human_paths: dict of named paths
#   entrypoint: starting screen filename
#   steps: list of navigation step descriptions (informational)
#   required_data: data keys needed to execute this path
#   emits_context: context items set after successful navigation
#   required_assertions: assertion keys that MUST pass after navigation
#
# assertions: dict of assertion key → description
#   Used in required_assertions to document what each assertion validates.
#
# VERSION HISTORY
# ---------------
# 1.0 — Initial contracts for FrmDetalleClie, FrmBusqueda, FrmAgenda, FrmLogin

_meta:
  version: "1.0"
  created_at: "2026-05-09"
  description: "Screen navigation contracts for Stacky QA UAT Agent"

# ─────────────────────────────────────────────────────────────────────────────
# LOGIN
# ─────────────────────────────────────────────────────────────────────────────
FrmLogin.aspx:
  screen_type: entrypoint
  direct_entry_allowed: true
  deeplink_allowed: false
  human_path_required_for_uat: false
  notes: "Entry point. Always accessible directly. Auth típicamente manejado por globalSetup; los playbooks explícitos sirven para escenarios que validan el flujo de login (regresiones de FrmLogin, smoke de autenticación, tests negativos de credenciales)."

  human_paths:
    open_direct:
      entrypoint: FrmLogin.aspx
      steps:
        - "Navigate directly to FrmLogin.aspx"
      required_data: []
      emits_context:
        - login_form_visible
      required_assertions:
        - login_form_visible

  assertions:
    login_form_visible: "abfUsuario / abfContrasena / btnOk visibles e interactuables"

  # Sub-flow playbooks (audit 2026-05-26 against trunk/OnLine/AgendaWeb/FrmLogin.aspx*)
  related_playbooks:
    happy_path:
      - login_explicit                          # btnOk con credenciales válidas → redirige a home (FrmAgenda / FrmBusqueda / FrmAdministrador)
    negative_path:
      - login_fail                              # credenciales inválidas → divError visible, sin redirección

# ─────────────────────────────────────────────────────────────────────────────
# BÚSQUEDA (search / list)
# ─────────────────────────────────────────────────────────────────────────────
FrmBusqueda.aspx:
  screen_type: list
  direct_entry_allowed: true
  deeplink_allowed: false
  human_path_required_for_uat: false

  human_paths:
    open_direct:
      entrypoint: FrmBusqueda.aspx
      steps:
        - "Navigate directly to FrmBusqueda.aspx"
      required_data: []
      emits_context:
        - search_form_visible
      required_assertions:
        - search_form_visible

  assertions:
    search_form_visible: "Search form is rendered and filters are interactable"

  # Sub-flow playbooks (audit 2026-05-26 against trunk/OnLine/AgendaWeb/FrmBusqueda.aspx)
  related_playbooks:
    smoke:
      - open_busqueda_directa                   # solo abre la pantalla
    by_filter:
      - busqueda_por_apellido                   # fill abfApellido1 (+ opcionales) → btnOk → GridPersonas
      - busqueda_por_dni                        # ddlTipoDocumento + abfDocumento → btnOk → GridPersonas
      - busqueda_detalle_cliente                # fill CLCOD exacto + navegar a detalle (encadenado)
    chained:
      - open_detalle_cliente_from_busqueda      # wrapper end-to-end: busqueda → fila → FrmDetalleClie

# ─────────────────────────────────────────────────────────────────────────────
# DETALLE CLIENTE (session-dependent detail screen)
# ─────────────────────────────────────────────────────────────────────────────
FrmDetalleClie.aspx:
  screen_type: detail
  direct_entry_allowed: false
  deeplink_allowed: true
  human_path_required_for_uat: true

  deeplink:
    pattern: "FrmDetalleClie.aspx?clcod={CLCOD}"
    required_params:
      - CLCOD
    reconstructs_context:
      - authenticated_user
      - selected_client
      - permissions
      - navigation_context
    required_assertions:
      - selected_client_loaded
      - detalle_cliente_visible
      - no_server_error
    allowed_lanes:
      - smoke_deeplink
      - regression_deeplink
      - diagnostic
      - forensic_rerun
    forbidden_lanes:
      - uat_human
      - uat_human_simulation

  human_paths:
    open_from_busqueda:
      entrypoint: FrmBusqueda.aspx
      steps:
        - "Navigate to FrmBusqueda.aspx"
        - "Fill CLCOD in the client filter"
        - "Click Buscar button"
        - "Verify at least one result row appears"
        - "Click on the matching client row"
        - "Verify FrmDetalleClie.aspx is loaded with client context"
      required_data:
        - CLCOD
      emits_context:
        - selected_client
        - navigation_context
      required_assertions:
        - search_results_visible
        - selected_client_loaded
        - detalle_cliente_visible

  assertions:
    selected_client_loaded: "Client code is visible in the detail form header or title"
    detalle_cliente_visible: "Detail form body (tabs, fields) is visible and not in error state"
    no_server_error: "No ASP.NET yellow screen of death or unhandled exception visible"
    search_results_visible: "Search results grid shows at least one row matching CLCOD"

  # Sub-flow playbooks (audit 2026-05-26 against trunk/OnLine/AgendaWeb/FrmDetalleClie.aspx)
  # The QA UAT agent must select the appropriate sub-playbook via index.json confidence_keywords
  # rather than reconstructing navigation steps from scratch.
  related_playbooks:
    tabs:
      - open_detalle_clie_tab_relaciones        # Telefonos/Emails/Domicilios del titular
      - open_detalle_clie_tab_contactos         # Terceros vinculados + sub-CRUD
      - open_detalle_clie_tab_pagos             # Histórico de pagos (read-only)
      - open_detalle_clie_tab_garantias         # CRUD de garantías
      - open_detalle_clie_tab_scorings          # Scoring (read-only) — ⚠ GridPersonas ID colisiona con FrmBusqueda
      - open_detalle_clie_tab_historicos        # Datos historicos x3 grids
      - frm_detalle_clie_domicilios             # Foco específico ADO-122 RF-007 Provincia/Departamento (sub-flow del tab Relaciones)
    modals_top_bar:
      - open_detalle_clie_modal_compromisos     # btnCompromisos → dlgCompromisos (gestión de promesas)
      - open_detalle_clie_modal_estados         # btnEstado → dlgEstadosEspeciales (read-only)
      - open_detalle_clie_modal_cheques         # btnChequesProtestados → dlgCheques (read-only)
      - open_detalle_clie_modal_pasaje_judicial # btnPasajeJudicial → dlgPasaje (judicializar = mutates_data)
      - open_detalle_clie_modal_notas           # btnNotas → dialogNotas
      - open_detalle_clie_modal_documento       # btnDocumento → GestionDocumentosUpload
    modals_row_triggered:
      - open_detalle_clie_modal_prestamos       # GridObligaciones row (tipo Préstamo) → dlgPrestamos
      - open_detalle_clie_modal_tarjetas        # GridObligaciones row (tipo Tarjeta) → dlgtarjetas
      - open_detalle_clie_modal_cuentas         # GridObligaciones row (tipo CtaCte) → dlgCuentas
      - open_detalle_clie_modal_gestiones       # GridGestiones row → dlgGestiones
    modals_indirect:
      - open_detalle_clie_modal_medio_contacto  # ADO-148 RF-013 — disparado desde gestiones tel/mail/dom
    static_maps:
      - frm_detalle_clie_actions                # Mapa estático global de acciones (no ejecutable directo)
    deprecated:
      - open_detalle_clie_modal_convenios_DEPRECATED  # ADO-146 RF-011: btnConvenios redirige a portal externo

  # Recent ADO tickets affecting selectors of this screen (informational — do not invent selectors
  # for fields/handlers not present in trunk).
  trunk_change_log:
    - ticket: ADO-119
      release: RF-008
      date: "2026-05-06"
      affects: "Header identity adds abfCorredorPrincipal + abfRiesgoCliente"
    - ticket: ADO-146
      release: RF-011
      date: "2026-05-14"
      affects: "btnConvenios.OnClick removed; redirects to external portal via injected OnClientClick"
    - ticket: ADO-148
      release: RF-013
      date: "2026-05-18"
      affects: "New modal dlgMedioContacto for gestiones tel/mail/dom"
    - ticket: ADO-162
      release: RF-015
      date: "2026-05-20"
      affects: "Detalle Deuda panel asegurador: lblPrimaNeta, lblIntereses, lblMontoCubierto + valores"

