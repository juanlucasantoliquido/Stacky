# ─────────────────────────────────────────────────────────────────────────────
# DETALLE OBLIGACION (session-dependent)
# ─────────────────────────────────────────────────────────────────────────────
FrmDetalleObligacion.aspx:
  screen_type: detail
  direct_entry_allowed: false
  deeplink_allowed: false
  human_path_required_for_uat: true

  human_paths:
    open_from_detalle_cliente:
      entrypoint: FrmDetalleClie.aspx
      steps:
        - "Navigate to FrmDetalleClie.aspx with CLCOD (via human_path open_from_busqueda)"
        - "Locate the obligaciones grid"
        - "Click on the target obligacion row"
        - "Verify FrmDetalleObligacion.aspx is loaded"
      required_data:
        - CLCOD
        - OBLCOD
      emits_context:
        - selected_client
        - selected_obligacion
      required_assertions:
        - obligacion_detail_visible
        - no_server_error

  assertions:
    obligacion_detail_visible: "Obligacion detail form is rendered with expected fields"
    no_server_error: "No ASP.NET yellow screen of death or unhandled exception visible"

