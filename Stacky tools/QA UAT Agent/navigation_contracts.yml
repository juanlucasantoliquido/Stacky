# ─────────────────────────────────────────────────────────────────────────────
# DETALLE DEMANDA JUDICIAL (FrmJDemanda — param-dependent, chained entry)
# ─────────────────────────────────────────────────────────────────────────────
FrmJDemanda.aspx:
  screen_type: detail
  direct_entry_allowed: false
  deeplink_allowed: true
  human_path_required_for_uat: true
  notes: "PARAM-DEPENDENT: Page_Load lee Request.QueryString['NumeroDeDemanda'] SIN null-check (línea 62) — entrar sin ese query param produce YSOD. También depende de Session['logUsuario'] y Session['lote']. Entry canónico: row-click en las grillas de FrmAgendaJudicial → FrmJDemanda.aspx?NumeroDeDemanda=<demanda> (Session PadreDemanda). Entry alternativo: btnJudicial/pasaje judicial desde FrmDetalleClie. Deeplink directo permitido SÓLO con NumeroDeDemanda y sesión ya válida."

  human_paths:
    open_from_agenda:
      entrypoint: FrmAgendaJudicial.aspx
      steps:
        - "Navigate to FrmAgendaJudicial.aspx (grids auto-populated)"
        - "Row-click on a demanda → redirects to FrmJDemanda.aspx?NumeroDeDemanda=<n>"
      required_data: []
      emits_context:
        - jdemanda_detail_visible
      required_assertions:
        - jdemanda_detail_visible
    open_deeplink:
      entrypoint: "FrmJDemanda.aspx?NumeroDeDemanda={JDEM_NUMERO_DEMANDA}"
      steps:
        - "Deeplink to FrmJDemanda.aspx with NumeroDeDemanda (requires valid session)"
      required_data:
        - JDEM_NUMERO_DEMANDA
      emits_context:
        - jdemanda_detail_visible
      required_assertions:
        - jdemanda_detail_visible

  assertions:
    jdemanda_detail_visible: "AISTabControl de la demanda (TabControl) renderizado con el header poblado"

  related_playbooks:
    chained:
      - open_jdemanda                           # entry chained desde FrmAgendaJudicial (row-click → ?NumeroDeDemanda)
    deeplink:
      - open_jdemanda                           # deeplink con JDEM_NUMERO_DEMANDA + sesión válida

