# screen_aliases.yml — Keyword aliases for screen detection (roadmap Cambio 1.4).
#
# Used by screen_detector.py to match Spanish/informal ticket text to canonical
# Agenda Web screen filenames when the exact filename is not mentioned.
#
# Format:
#   FrmScreenName.aspx:
#     aliases:
#       - spanish phrase or keyword (lowercase)
#
# Confidence assigned for alias matches: 0.60 (lower than exact match at 0.70-1.0).
# All aliases are matched case-insensitively and as substrings.
#
# MAINTENANCE: add aliases when a new ticket misidentifies a screen due to informal
# language. Never remove an alias without a reason — silent fallbacks cause false runs.

FrmDetalleClie.aspx:
  aliases:
    - detalle cliente
    - detalle de cliente
    - vista relaciones
    - mantenedor de domicilios
    - domicilio cliente
    - provincia departamento
    - ficha cliente
    - datos del cliente
    - perfil cliente
    - detalle del cliente
    - mantenedordireccion
    - direcciones del cliente

