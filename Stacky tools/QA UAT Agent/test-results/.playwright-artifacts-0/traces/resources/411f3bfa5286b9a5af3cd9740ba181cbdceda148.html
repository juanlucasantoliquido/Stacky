    <script type="text/javascript">
        let countdownDuration = 30;
        let intervalId;
        const mensajeModal = document.getElementById('lblMensajeModal');

        function startCountdown() {
            intervalId = setInterval(updateCountdown, 1000);
            btnMantener.addEventListener('click', resetCountdown);
        }

        function resetCountdown() {
            clearInterval(intervalId);
            countdownDuration = 30;
        }

        function updateCountdown() {
            countdownDuration--;
            if (countdownDuration === 0) {
                clearInterval(intervalId);
                btnAbandonar.click();
            }
            else {
                lblMensajeModal.textContent = "Se ha detectado un periodo de inactividad, en " + countdownDuration + " segundo(s) se cerrará sesión";
            }
        }
    </script>
