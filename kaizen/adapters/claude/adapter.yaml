# Adapter AI-driven (AOTL): improver/evaluator via Claude Code CLI (claude -p, print/read-only).
# El modelo SÓLO propone y evalúa (genera JSON); Python aplica el change_set de forma
# determinista y reversible. Activá el modo con `mode: aotl` en config/kaizen.config.yaml.

name: claude
description: AOTL con Claude Code CLI. El modelo propone/evalúa; Python aplica reversible.

observe:
  mode: snapshot          # se le pasa al modelo un snapshot del foco (no toca nada externo)
  # Archivos cuyo CONTENIDO ve el modelo y dentro de los cuales puede proponer cambios.
  # DENYLIST (nunca editables, forzada en scripts/aotl_state.py PROTECTED_PREFIXES/FILES):
  #   Prefijos protegidos: sessions/, decisions/, artifacts/, .git/
  #   Archivos protegidos (maquinaria del arnes — NO editables por el loop):
  #     .gitignore, kaizen.py, config/kaizen.config.yaml,
  #     scripts/aotl_state.py, scripts/apply.py, scripts/autoloop.py, scripts/engine.py,
  #     scripts/dashboard.py, scripts/run_session.py, scripts/validate.py,
  #     scripts/forensic.py, scripts/new_session.py, scripts/selfcheck.py,
  #     scripts/spawn_child.py, scripts/promote_decision.py
  #   Editables por el loop (tests, visualizacion, utilidades):
  #     scripts/test_core.py, scripts/test_aotl.py, scripts/dashboard_static.py,
  #     scripts/metrics.py, scripts/doctor.py, scripts/archive.py, scripts/check.py,
  #     scripts/forensic_view.py, scripts/list_sessions.py, scripts/show_session.py,
  #     scripts/adapter_info.py, docs/, playground/
  focus:
    - playground          # sandbox seguro para experimentos
    - docs                # documentacion del ciclo (sincronizacion post-sesion)
    - scripts             # scripts del ciclo (mejoras acotadas; denylist frena lo critico)

engine:
  driver: claude
  command: claude         # CLI en PATH
  model: claude-sonnet-4-6  # más barato para un loop que corre seguido; subí a opus si querés
  timeout_seconds: 180

apply:
  mode: auto              # apply.py escribe el change_set (determinista)
  rollback: auto          # rollback por pre-imagen (stdlib), sin depender de git

measure:
  command: selfcheck      # métrica de regresión objetiva (el "CHECK" del ciclo)
